<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HND Accident/Incident Information</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* スクロールバーを出さない設定は維持 */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #ffffff; margin: 0; padding: 1.5vw; height: 100vh; display: flex; flex-direction: column; overflow: hidden; box-sizing: border-box; }
        
        /* ヘッダーの高さは維持 (12vh) */
        .header { height: 12vh; display: flex; align-items: center; margin-bottom: 1vh; }
        .header img { height: 8vh; margin-right: 1.5vw; }
        .header-text { line-height: 1.2; }
        .header h1 { font-size: 3.2vh; color: #002f6c; margin: 0; }
        .company-name { font-size: 2vh; color: #002f6c; font-weight: bold; line-height: 1.3; }
        
        /* 【変更】画像を上に近づけるため、margin-bottomを 2vh から 0.5vh に縮小 */
        .main-container { height: 52vh; display: flex; justify-content: space-between; align-items: flex-start; gap: 2vw; margin-bottom: 0.5vh; }
        .table-section { width: 50%; height: 100%; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 1.6vh; margin-bottom: 2vh; }
        th, td { padding: 0.8vh; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #002f6c; color: white; }
        
        /* チャートエリアの高さをメインコンテンツに合わせる */
        .chart-section { width: 45%; height: 100%; display: flex; justify-content: center; align-items: center; background-image: url('newlogo.jpg'); background-repeat: no-repeat; background-position: center; background-size: contain; opacity: 0.8; }
        .chart-container { width: 80%; aspect-ratio: 1 / 1; position: relative; background-color: rgba(255, 255, 255, 0.7); border-radius: 50%; }
        
        /* 【変更】中央テキスト全体の配置調整 */
        .chart-text { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; 
            width: 90%; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        /* 制限区域内 無事故日数目標 */
        .text-line1 { font-size: 3.0vh; color: #d32f2f; font-weight: bold; margin-bottom: 1.5vh; white-space: nowrap; } 
        /* 〇〇日 */
        .text-line2 { font-size: 9.5vh; color: #002f6c; font-weight: bold; line-height: 1.1; margin-bottom: 2.0vh; } 
        
        /* 【変更】〇〇日 継続中！（青背景に白文字の四角デザイン） */
        .text-line3 { 
            font-size: 4.2vh; 
            color: #ffffff; 
            background-color: #00bfff; 
            font-weight: bold; 
            white-space: nowrap; 
            padding: 0.8vh 2.5vh; 
            border-radius: 0.8vh; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }

        /* 【変更】画像エリアの上部を少しマイナス方向に引っ張り、位置を上に上げました */
        .image-section {
            height: 32vh; /* 高さを少し広げて画像を大きく表示できるように調整 */
            margin-top: -1.5vh; /* テーブルとチャートのエリアに少し近づける */
            display: flex;
            justify-content: flex-start; /* 左寄せ */
            align-items: center;
            gap: 2vw; /* 画像間の隙間 */
            display: none; /* 初期状態は非表示 */
        }
        .image-section img {
            height: 100%; /* エリアの高さ一杯に広げる */
            width: auto; /* 横幅は自動調整 (アスペクト比維持) */
            object-fit: contain; /* 領域内に収める */
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="newlogo.jpg" alt="Logo">
        <div class="header-text">
            <h1>KAS Accident/Incident Information</h1>
            <div class="company-name">KANSAI AIRPORTS<br>Aviation Services</div>
        </div>
    </div>

    <div id="loading" style="font-size: 3vh; padding: 10vh;">読み込み中...</div>

    <div id="content-wrap" style="display: none; flex: 1; display: flex; flex-direction: column;">
        
        <div class="main-container" id="main-container">
            <div class="table-section" id="table-section"></div>
            <div class="chart-section">
                <div class="chart-container">
                    <canvas id="doughnutChart"></canvas>
                    <div class="chart-text">
                        <div class="text-line1">制限区域内 無事故日数目標</div>
                        <div class="text-line2"><span id="goal-days-display">0</span>日</div>
                        <div class="text-line3"><span id="current-days-display">0</span>日 継続中！</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="image-section" id="image-section">
            <img src="safex1.jpg" alt="Safety Image 1">
            <img src="safex2.jpg" alt="Safety Image 2">
        </div>
        
    </div>

    <script>
        // HND支店専用のCSV URL (gid=2118289952) は変更していません
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRju7RHJ7_5PMGhXmQhcnCs5S6YiAwLY-mVASp8wbhF7l0oCj2PyRN51IAOdoJQGboNAOZiIhNI4mKh/pub?gid=2118289952&single=true&output=csv';

        async function loadData() {
            try {
                const response = await fetch(csvUrl + '&t=' + new Date().getTime());
                const text = await response.text();
                const rows = text.split(/\r?\n/);
                const data = rows.map(line => line.split(',').map(c => c.trim().replace(/^"(.*)"$/, '$1')));
                
                const goal = parseInt(data[15][1]); 
                const cur = parseInt(data[16][1]); 
                
                document.getElementById('goal-days-display').textContent = isNaN(goal) ? 0 : goal;
                document.getElementById('current-days-display').textContent = isNaN(cur) ? 0 : cur;

                const tableSection = document.getElementById('table-section');
                tableSection.innerHTML = '';
                
                const createTable = (h, r) => {
                    const t = document.createElement('table');
                    t.innerHTML = `<thead><tr>${h.map(i=>`<th>${i}</th>`).join('')}</tr></thead><tbody>${r.map(row=>`<tr>${row.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>`;
                    tableSection.appendChild(t);
                };
                
                // 1つ目のテーブルを表示
                if(data[1]) createTable(data[1].slice(0,3), [data[2].slice(0,3)]);
                
                // 2つ目のテーブル（各空港）の非表示は維持
                
                // 3つ目のテーブル（Safety KPI 安全成績指標）を表示
                if(data[7]) {
                    const kpiRows = data.slice(8).filter(r => 
                        r[0] && r[0] !== "制限区域内無事故日数目標" && r[0] !== "継続日数"
                    ).map(r => r.slice(0,3));
                    createTable(data[7].slice(0,3), kpiRows);
                }

                const ctx = document.getElementById('doughnutChart').getContext('2d');
                new Chart(ctx, {
                    type: 'doughnut',
                    data: { datasets: [{ data: [cur, Math.max(0, goal-cur)], backgroundColor: ['#00bfff', '#eee'] }] },
                    options: { cutout: '80%', plugins: { legend: { display: false } } }
                });

                // 表示の切り替え
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content-wrap').style.display = 'flex';
                document.getElementById('image-section').style.display = 'flex';
            } catch(e) { document.getElementById('loading').textContent = 'エラーが発生しました'; }
        }
        loadData();
    </script>
</body>
</html>
